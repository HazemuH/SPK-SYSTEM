# Render Blueprint — deploys the whole SPK Mainan stack (free tier).
#   1. Push this repo to your GitHub.
#   2. On render.com: New → Blueprint → pick this repo. Render reads this file.
#   3. It provisions: a PostgreSQL DB, the Spring Boot API, and the React web app.
#
# Free-tier notes:
#   - The backend (a "web service") SLEEPS after ~15 min idle and takes ~30-60s to
#     wake on the next request. Open the site a minute before a demo.
#   - The free PostgreSQL instance expires after 90 days (Render will email you).
#   - CORS: the API only allows the web app's URL. See CORS_ALLOWED_ORIGINS below.

databases:
  - name: spk-mainan-db
    databaseName: spk_mainan
    user: spk_mainan
    plan: free

services:
  # ---- Backend: Spring Boot API (Docker) ----
  - type: web
    name: spk-mainan-api
    runtime: docker
    plan: free
    rootDir: BACKEND
    dockerfilePath: ./Dockerfile
    healthCheckPath: /v1/actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Map Render's managed Postgres into the env vars application-prod.yml expects.
      # Render's connectionString is `postgresql://user:pass@host/db`, but Spring's JDBC
      # driver needs a `jdbc:postgresql://...` URL with credentials passed separately.
      # We build the JDBC URL from the discrete host/port/db properties instead.
      - key: DB_HOST
        fromDatabase:
          name: spk-mainan-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: spk-mainan-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: spk-mainan-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: spk-mainan-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: spk-mainan-db
          property: password
      - key: JWT_SECRET
        generateValue: true # Render generates a long random secret and keeps it stable.
      # Which browser origin may call the API. Set to the web app's URL after first deploy.
      - key: CORS_ALLOWED_ORIGINS
        value: https://spk-mainan-web.onrender.com

  # ---- Frontend: React SPA (static site) ----
  - type: web
    name: spk-mainan-web
    runtime: static
    rootDir: FRONTEND
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Baked into the build (Vite reads VITE_* at build time). Points at the API above.
      - key: VITE_API_BASE_URL
        value: https://spk-mainan-api.onrender.com/v1
    routes:
      # SPA client-side routing: serve index.html for any unknown path.
      - type: rewrite
        source: /*
        destination: /index.html
