# Production profile: PostgreSQL. Activate with `--spring.profiles.active=prod`.
# All values come from environment variables so no secrets live in the repo.
spring:
  datasource:
    # Prefer an explicit DB_URL (e.g. docker-compose); otherwise build one from the
    # discrete DB_HOST/DB_PORT/DB_NAME parts a managed provider (Render) exposes.
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:spk_mainan}}
    username: ${DB_USERNAME:spk_mainan}
    password: ${DB_PASSWORD:spk_mainan}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  h2:
    console:
      enabled: false

  flyway:
    enabled: true

logging:
  level:
    org.springframework.security: WARN
