# Production profile: PostgreSQL. Activate with `--spring.profiles.active=prod`.
# All values come from environment variables so no secrets live in the repo.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spk_mainan}
    username: ${DB_USERNAME:spk_mainan}
    password: ${DB_PASSWORD:spk_mainan}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  h2:
    console:
      enabled: false

  flyway:
    enabled: true

logging:
  level:
    org.springframework.security: WARN
