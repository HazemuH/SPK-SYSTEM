spring:
  application:
    name: spk-mainan-backend

  # Default profile uses in-memory H2 so the app runs with zero setup.
  # Switch to PostgreSQL via `--spring.profiles.active=prod` (see application-prod.yml).
  datasource:
    url: jdbc:h2:mem:spkmainan;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      # Schema is owned by Flyway; JPA only validates that entities match it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    # Mobile app expects the API under `/v1` (see ApiConfig.baseUrl).
    context-path: /v1

app:
  jwt:
    # Override in production via the JWT_SECRET env var (>= 32 chars for HS256).
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-use-a-long-random-256-bit-value}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24h
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
